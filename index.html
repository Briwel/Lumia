        font-family: 'Inter', sans-serif;

      }

      .no-scrollbar::-webkit-scrollbar {
          display: none;

{

  <body class="bg-slate-50 text-slate-800 antialiased selection:bg-indigo-100 selection:text-indigo-700">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('🚀 [Lumina PWA] Service Worker enregistré avec succès:', reg.scope))
            .catch((err) => console.error('❌ [Lumina PWA] Échec d\'enregistrement du Service Worker:', err));
        });
      }
    </script>
