<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="lumina-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Rounded elegant background card -->
  <rect width="512" height="512" rx="128" fill="#0f172a" />
  
  <!-- Outer subtle circular design line -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#lumina-grad)" stroke-width="2" opacity="0.3" stroke-dasharray="10 15" />
  
  <g transform="translate(128, 120)">
    <!-- Roof line -->
    <path d="M 128,0 L 256,110 L 210,110 L 128,42 L 46,110 L 0,110 Z" fill="url(#lumina-grad)" filter="url(#glow)" />
    
    <!-- Stylized modern "L" house base -->
    <path d="M 46,128 L 46,230 C 46,240 54,248 64,248 L 210,248 C 220,248 228,240 228,230 L 228,190 L 102,190 L 102,128 Z" fill="url(#lumina-grad)" />
    
    <!-- Intelligent Core Sparkle (AI representation) -->
    <circle cx="128" cy="110" r="14" fill="#ffffff" filter="url(#glow)" />
  </g>
</svg>
